openapi: 3.1.0
info:
  title: DynamicRef Request Response Inline Binding API
  version: 0.1.0
paths:
  /shared:
    post:
      operationId: submitShared
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $defs:
                itemType:
                  $dynamicAnchor: itemType
                  type: object
                  required: [id, name]
                  properties:
                    id:
                      type: string
                    name:
                      type: string
              $ref: '#/components/schemas/SharedTemplate'
      responses:
        '200':
          description: Shared response
          content:
            application/json:
              schema:
                $defs:
                  itemType:
                    $dynamicAnchor: itemType
                    type: object
                    required: [id, label]
                    properties:
                      id:
                        type: string
                      label:
                        type: string
                $ref: '#/components/schemas/SharedTemplate'
        default:
          description: Error
components:
  schemas:
    SharedTemplate:
      $id: https://example.com/schemas/SharedTemplate
      $dynamicAnchor: itemType
      type: object
      required: [items]
      properties:
        items:
          type: array
          items:
            $dynamicRef: '#itemType'
