version: 2
updates:
  - package-ecosystem: nuget
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    labels:
      - generator
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
      OpenTelemetry:
        patterns:
          - OpenTelemetry.*
          - Azure.Monitor.OpenTelemetry.Exporter
      MicrosoftExtensions:
        patterns:
          - Microsoft.Extensions.*
      coverlet:
        patterns:
          - coverlet.*
    cooldown:
      default-days: 7
  - package-ecosystem: github-actions
    directory: /
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    cooldown:
      default-days: 7
  - package-ecosystem: nuget
    directories:
      - /it/csharp
      - /it/csharp/basic
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: gomod
    directories:
      - /it/go
      - /it/go/basic
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: composer
    directories:
      - /it/php
      - /it/php/basic
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: pip
    directory: /it/python
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
      pytest:
        patterns:
          - astroid*
          - isort*
          - pylint*
          - pytest*
    cooldown:
      default-days: 7
  - package-ecosystem: bundler
    directory: /it/ruby
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: maven
    directories:
      - /it/java
      - /it/java/basic
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: pub
    directory: /it/dart
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: /it/typescript
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      kiota-dependencies:
        patterns:
          - '*kiota*'
      eslint:
        patterns:
          - '*eslint*'
    cooldown:
      default-days: 7
  - package-ecosystem: npm
    directory: /vscode
    schedule:
      interval: daily
    open-pull-requests-limit: 10
    groups:
      eslint:
        patterns:
          - '*eslint*'
    cooldown:
      default-days: 7
  - package-ecosystem: dotnet-sdk
    directory: /
    schedule:
      interval: weekly
      day: wednesday
    ignore:
      - dependency-name: '*'
        update-types:
          - version-update:semver-major
          - version-update:semver-minor
    cooldown:
      default-days: 7
